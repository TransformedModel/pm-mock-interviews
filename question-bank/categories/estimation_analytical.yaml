version: 1
category: Estimation (Analytical)
questions:
  - id: EA-001
    difficulty: easy
    prompt: Estimate the number of cups of coffee consumed in Singapore per day.
    what_good_looks_like:
      - Clarifies geography and definition (coffee drinks vs cups; includes cafes + instant?).
      - Chooses a clear top-down or bottom-up structure.
      - States assumptions explicitly and sanity-checks the result.
      - Communicates ranges and sensitivity drivers.
    answer:
      structure:
        - Clarify scope and define “cup”.
        - Choose approach (population × consumption frequency).
        - Do math with round numbers; provide range.
        - Sanity-check vs cafe counts / imports.
      sample: >
        I’ll estimate cups of coffee drinks consumed (including instant and cafe) by residents + commuters in Singapore.
        Population ~6M. Assume 70% adults (~4.2M). Of adults, say 60% drink coffee daily (~2.5M). Average daily cups among
        drinkers: maybe 1.2 (some 1, some 2+). That yields ~3.0M cups/day.

        Add non-daily drinkers: remaining 1.7M adults maybe 1 cup/week on average → ~0.25M/day. Add teens/others: ~0.2M/day.
        Total ~3.5M cups/day, range 3–5M depending on daily drinker % and cups per drinker.
    follow_ups:
      - What assumption matters most?
      - How would you validate this quickly?
      - How would your estimate change if we only count cafe-bought coffee?

  - id: EA-002
    difficulty: medium
    prompt: Estimate the annual revenue of Netflix in India.
    what_good_looks_like:
      - Breaks revenue into subscribers × ARPU × months.
      - Uses plausible penetration and pricing tiers.
      - Mentions paid sharing, bundles, or telco partnerships as adjustments.
      - Provides a range and checks reasonableness.
    answer:
      structure:
        - Clarify whether to include ads, bundles, etc.
        - Estimate subscriber base via households × penetration.
        - Estimate ARPU using tier mix.
        - Compute annual revenue and range.
      sample: >
        I’ll estimate subscription revenue (not ads). India population ~1.4B; households ~300M. Suppose “addressable” is
        urban/middle-class households with broadband/smartphones: maybe 80M. Assume Netflix penetration 5–10% of that:
        4–8M paying accounts.

        ARPU: Netflix has low-cost mobile plans; assume blended ARPU ~$4–6/month. Annual revenue = 4–8M × $4–6 × 12
        ≈ $192M to $576M. Midpoint: ~6M × $5 × 12 = $360M/year.
    follow_ups:
      - How does competition change your penetration assumption?
      - How would ad-supported tiers affect ARPU?

  - id: EA-003
    difficulty: medium
    prompt: How many rides does a typical Uber driver complete per day in a major city?
    what_good_looks_like:
      - Clarifies city type, driver hours, and whether including downtime.
      - Uses a cycle-time model: (trip duration + pickup + idle).
      - Provides a range for part-time vs full-time drivers.
      - Sanity-checks with observed wait times and traffic.
    answer:
      structure:
        - Clarify driver type and hours.
        - Model average trip cycle time.
        - Convert hours → rides; provide ranges.
      sample: >
        Assume a full-time driver works 8–10 hours “online”. Average trip: 15 minutes in-car + 5 minutes pickup + 5 minutes
        idle repositioning → ~25 minutes per ride cycle. That’s ~2.4 rides/hour.

        Over 9 hours: 9 × 2.4 ≈ 22 rides/day. Range: 15–30 depending on traffic, city density, and surge demand; part-time
        4–5 hours would be ~10–12 rides.
    follow_ups:
      - How would peak-hour demand change this?
      - What data would you ask Uber for to refine?

  - id: EA-004
    difficulty: hard
    prompt: You own a B2B SaaS product. DAU dropped 20% overnight. Walk me through your analysis.
    what_good_looks_like:
      - Starts with validation: instrumentation, definition changes, logging.
      - Segments by platform, geography, customer, and cohort.
      - Uses funnel + infra checks + release correlation.
      - Produces an action plan with owners and comms.
    answer:
      structure:
        - Confirm the metric is real (tracking, sampling, dashboards).
        - Scope impact (which users/accounts/platforms).
        - Hypothesize buckets: product change, infra/latency, auth, pricing, external events.
        - Narrow with data: time series, segment splits, error logs.
        - Mitigate quickly; then root-cause and prevention.
      sample: >
        First I’d validate DAU: did the definition or event pipeline change? Check ingestion lag, dropped events, and whether
        other metrics (sessions, page views) dropped similarly. If the metric is real, I’d segment: which customers, plans,
        geos, devices, and entry points. I’d correlate the timestamp to deployments, incidents, or upstream dependencies.

        Next I’d inspect the login funnel: login page loads, auth success, token refresh, and error rates. A DAU drop often
        comes from auth breakage, a permissions issue, or performance regression. I’d also check whether one major enterprise
        customer churned or had an outage (account-level DAU).

        Mitigation: if correlated with a release, consider rollback; if infra, scale/restore; if auth, hotfix and communicate
        to affected customers. Then do a postmortem with monitoring and canarying improvements.
    follow_ups:
      - What if only iOS users dropped?
      - What if DAU dropped but revenue stayed flat?
      - How do you decide to rollback vs hotfix?

  - id: EA-005
    difficulty: medium
    prompt: Estimate the number of email addresses created worldwide per day.
    what_good_looks_like:
      - Defines “created” vs “active” and whether to include aliases.
      - Uses population/internet users and signup rates.
      - Applies a sanity check using known provider scales.
      - Provides a range.
    answer:
      structure:
        - Clarify definition.
        - Estimate new internet users + new account creation per user/year.
        - Convert to daily; provide range.
      sample: >
        Define “created email address” as a new mailbox (not aliases). Global internet users ~5B. New internet users maybe
        ~200M/year → ~0.55M/day, many create at least one email, so ~0.5M/day baseline.

        Existing users also create new addresses (work, spam, new providers). Suppose 10% create one new address per year:
        0.10 × 5B = 500M/year → ~1.4M/day. Total ~2M/day. Range 1–5M/day depending on the “new address per user” rate.
    follow_ups:
      - How would you validate this?
      - What assumption is most uncertain?

  - id: EA-006
    difficulty: hard
    prompt: Estimate the market size (annual GMV) for online grocery delivery in the US.
    what_good_looks_like:
      - Decomposes into households × grocery spend × online penetration.
      - Addresses frequency and average order value.
      - Handles TAM vs SAM vs SOM explicitly.
      - Gives a range and notes macro drivers.
    answer:
      structure:
        - Clarify TAM vs current market.
        - Estimate total grocery spend, then apply online share.
        - Cross-check with order model.
      sample: >
        I’ll estimate current annual GMV. US households ~130M. Average grocery spend maybe ~$150/week → ~$7,800/year.
        Total grocery spend ≈ 130M × $7.8k ≈ $1.0T/year.

        Online grocery delivery share: assume 10–15% of spend → $100–150B GMV/year. Cross-check: if 30M households place
        1 delivery/week at $90 AOV → 30M × 52 × $90 ≈ $140B. That’s consistent; range $80–180B.
    follow_ups:
      - What would make online share increase fastest?
      - How would you estimate SOM for a new entrant?

  - id: EA-007
    difficulty: medium
    prompt: Estimate how many photos are uploaded to Instagram per minute.
    what_good_looks_like:
      - Clarifies whether including stories/reels vs feed posts.
      - Uses MAU/DAU and posting frequency.
      - Provides order-of-magnitude estimate with range.
      - Sanity-checks with known scale signals.
    answer:
      structure:
        - Define scope (feed photos only).
        - Estimate daily posts = active users × posts/user/day.
        - Convert to per minute.
      sample: >
        I’ll estimate feed photo posts (excluding stories/reels). Suppose Instagram DAU ~500M–700M globally. Assume average
        daily posting is low: maybe 1% post a feed photo per day (many lurk). That’s 5–7M photos/day.
        Per minute: 5–7M / 1,440 ≈ 3,500–4,900 photos/minute. Range 2k–10k depending on posting rate.
    follow_ups:
      - How would including Stories change your estimate?
      - What’s the biggest driver: DAU or posting rate?

  - id: EA-008
    difficulty: hard
    prompt: You launched a new search ranking model. Conversion is up, but complaints about “relevance” increased. Explain why and what you do next.
    what_good_looks_like:
      - Recognizes metric misalignment and segment effects.
      - Discusses short-term conversion vs long-term trust/retention.
      - Proposes diagnostics: query segments, dissatisfaction signals, offline eval.
      - Suggests mitigations: constraints, diversity, calibration, UI changes.
    answer:
      structure:
        - Clarify what “conversion” means and time horizon.
        - Hypothesize causes (over-optimization, novelty, query mix).
        - Segment analysis (head vs tail queries, intents).
        - Decide on next steps and guardrails.
      sample: >
        Conversion up could mean we’re better at commercial intents, but complaints suggest we’re failing for informational
        or long-tail queries. The model might be over-optimizing short-term clicks/purchases, showing repetitive or sponsored
        items, or reducing diversity—users convert sometimes but feel the results are less trustworthy.

        Next I’d segment by query intent, new vs returning users, and complaint origin. I’d look at dissatisfaction signals:
        rapid reformulations, pogo-sticking, time-to-result, and “back” rates. I’d also run offline relevance evaluation with
        human labels and compare against the old model.

        Mitigation options: add guardrail objectives (diversity/fairness), calibrate ranking for informational intents, and
        adjust UI to label sponsored content. I’d keep the win where it’s real but prevent long-term trust erosion.
    follow_ups:
      - What guardrail metrics would you add?
      - How would you run a rollback decision?

  - id: EA-009
    difficulty: medium
    prompt: Estimate the number of elevators in New York City.
    what_good_looks_like:
      - Chooses a structured proxy (buildings by type × elevators per building).
      - Uses rough counts and checks plausibility.
      - Communicates uncertainty and range.
    answer:
      structure:
        - Estimate number of buildings by height class.
        - Multiply by average elevators per class.
        - Add commercial vs residential adjustment.
      sample: >
        NYC has lots of low-rises plus many high-rises. Suppose ~1M housing units; maybe ~30% are in elevator buildings.
        If average elevator building has ~50 units, then elevator residential buildings ≈ (0.3 × 1M) / 50 = 6,000 buildings.
        Assume average 2 elevators each → 12,000.

        Add commercial high-rises and hotels: say 1,000 buildings averaging 6 elevators → 6,000. Total ~18,000 elevators,
        range 10k–30k.
    follow_ups:
      - How would you validate with public data?
      - What assumption is most sensitive?

  - id: EA-010
    difficulty: hard
    prompt: How would you design an A/B test to measure whether a new checkout page increases revenue?
    what_good_looks_like:
      - Defines primary metric and guardrails (conversion, AOV, refunds).
      - Handles sample size, duration, and seasonality.
      - Considers randomization unit (user vs session) and contamination.
      - Includes analysis plan and monitoring.
    answer:
      structure:
        - Define hypothesis and metrics.
        - Choose randomization unit and eligibility.
        - Estimate sample size and runtime; handle seasonality.
        - Guardrails and rollout.
      sample: >
        Hypothesis: the new checkout reduces friction and increases completed orders. Primary metric: revenue per user (or per
        session) to capture conversion and AOV. Guardrails: refund rate, payment failures, latency, and customer support
        contacts.

        Randomize at user level to avoid contamination across sessions; exclude bots and internal traffic. Run for at least
        1–2 business cycles (often 2 weeks+) to capture weekday patterns, and ensure enough power to detect a small lift.
        Monitor SRM (sample ratio mismatch), and predefine stopping rules. If successful, ramp gradually with monitoring.
    follow_ups:
      - When would you choose conversion rate instead of revenue/user?
      - How do you handle repeated exposures across devices?

  - id: EA-011
    difficulty: medium
    prompt: Estimate the number of people who watch YouTube on a TV screen in the US each month.
    what_good_looks_like:
      - Clarifies “TV screen” (smart TV apps, casting, consoles).
      - Uses households, penetration, and viewing behavior.
      - Gives a range with sensitivity drivers.
    answer:
      structure:
        - Estimate US households and smart TV penetration.
        - Estimate fraction using YouTube on TV monthly.
        - Convert to people via household size.
      sample: >
        US households ~130M. Smart TV/streaming device penetration is high; assume 90% have some TV-connected device:
        ~117M. Suppose 40–60% use YouTube on TV monthly: ~47–70M households.

        People per household watching: maybe 1.5 on average → ~70–105M people/month. Range 60–120M depending on adoption.
    follow_ups:
      - How would you validate this estimate quickly?
      - What cohort would be the biggest driver?

  - id: EA-012
    difficulty: hard
    prompt: Your subscription product’s churn rose from 3% to 5% monthly. What analyses do you run and what actions do you take?
    what_good_looks_like:
      - Distinguishes voluntary vs involuntary churn.
      - Segments churn by cohort, plan, channel, and lifecycle stage.
      - Looks for product usage leading indicators and pricing/competition factors.
      - Proposes a prioritized action plan with experiments.
    answer:
      structure:
        - Validate churn definition and measurement window.
        - Segment churn (voluntary/involuntary; cohorts; plans).
        - Diagnose drivers (value, friction, price, support, competition).
        - Decide mitigations and experiments.
      sample: >
        First I’d confirm whether churn is voluntary cancellations or payment failures, and whether billing logic changed.
        Then segment: new cohorts vs mature cohorts, by plan, by acquisition channel, and by geography. A jump often means a
        specific cohort got worse or a payment processor changed.

        I’d inspect leading indicators: feature usage frequency, time-to-value, and support contacts. If voluntary churn,
        analyze cancellation reasons and competitor switching. If involuntary, focus on dunning and payment retries.

        Actions: address the largest segment first. For voluntary churn, improve onboarding and core value delivery and test
        save offers/pause plans. For involuntary churn, improve retries, card updater, and notifications. Track retention and
        LTV impact with guardrails for discounting.
    follow_ups:
      - What’s the fastest “stop the bleeding” move?
      - How do you avoid over-discounting?

  - id: EA-013
    difficulty: medium
    prompt: Estimate the number of active Uber (or rideshare) drivers in New York City on a typical weekday.
    what_good_looks_like:
      - Clarifies “active” (online at least once vs full-time equivalents) and geography (five boroughs vs metro).
      - Uses supply–demand or hours-driven / utilization framing, not a wild guess.
      - Shows math with explicit assumptions and a reasonable range.
      - Sanity-checks against rides per day and driver hours.
    answer:
      structure:
        - Define active driver and geography.
        - Estimate daily rides or driver-hours needed, then back into drivers.
        - Or estimate licensed drivers × activity rate.
        - State range and key sensitivities.
      sample: >
        I’ll estimate drivers who go online at least once on a weekday in NYC (five boroughs). Approach: start from demand.
        NYC population ~8.5M; daily commuters and visitors add effective demand—say ~10M people needing mobility some days.
        Rideshare might handle ~10–15% of non-transit trips in dense areas; simpler: industry ballpark often cited is millions of
        rides/day in major metros. Assume NYC rideshare completes ~400k–700k trips/day (Uber + Lyft + others).

        If average driver online 6 hours/day and completes ~2 rides/hour (mix of short Manhattan hops and airport), that is
        ~12 rides per online driver-day. Drivers needed = trips / rides per driver = 500k / 12 ≈ 42k “driver-days” if everyone
        worked one day—but many drivers are part-time. If average driver is online 3 days/week equivalent, active weekday
        drivers ≈ 42k × (5/7) × adjustment… cleaner: suppose 500k trips and each active driver does 10 trips that day →
        50k drivers minimum; if 15 trips → ~33k.

        Cross-check supply side: NYC has a large TLC-licensed for-hire driver pool (order-of-magnitude tens of thousands);
        not all drive daily. I’ll land on ~35k–60k drivers with at least one trip on a typical weekday, wider range 25k–80k
        if trips/day is uncertain.
    follow_ups:
      - How would airport demand change your rides-per-driver assumption?
      - What single data point from Uber would most shrink your confidence interval?

  - id: EA-014
    difficulty: medium
    prompt: Estimate the number of domestic commercial passenger flights in the United States per day.
    what_good_looks_like:
      - Clarifies domestic vs international and commercial vs cargo/GA.
      - Uses airports, movements, or seats as a decomposition path.
      - Converts annual or hourly figures to daily with explicit rounding.
      - Sanity-checks against public order-of-magnitude stats (rough).
    answer:
      structure:
        - Define scope (US domestic, scheduled airline).
        - Estimate from passengers or from airport operations.
        - Divide to per day; give range.
      sample: >
        Scope: US domestic, scheduled commercial passenger flights (not private jets, not pure cargo).

        Path A—passengers: US domestic enplanements are order-of-magnitude hundreds of millions per year (rough public
        ballpark ~700M–800M/year). Average load factor ~80–90%; average seats per departure maybe ~140 for domestic mix.
        Passengers per year / (load factor × seats) ≈ departures. 750M / (0.85 × 140) ≈ 750M / 120 ≈ 6.3M departures/year.
        Per day: 6.3M / 365 ≈ 17,200 departures/day.

        Path B—movements: large US airports each handle hundreds to over a thousand daily commercial movements; ~30 very
        busy hubs plus hundreds of regional airports. Order-of-magnitude tens of thousands of commercial flights/day aligns
        with Path A.

        I’ll answer ~15k–25k domestic commercial passenger flights/day, noting international and cargo are excluded.
    follow_ups:
      - How would you separate mainline vs regional carriers?
      - What happens to your estimate on Thanksgiving Sunday?

  - id: EA-015
    difficulty: easy
    prompt: Estimate how many slices of pizza are consumed in the United States on a typical Friday night.
    what_good_looks_like:
      - Defines “Friday night” window and slice vs whole pie.
      - Uses population × eating-out rate or pizza industry scale.
      - Gives a range and a quick sanity check.
    answer:
      structure:
        - Time window and unit.
        - Population × participation × slices.
        - Adjust for pizza-heavy vs other dinner choices.
      sample: >
        Define Friday night as 6pm–midnight. US population ~335M. Not everyone eats dinner out; assume ~20% of people have
        pizza as part of dinner on a given Friday (delivery, dine-in, frozen baked at home counts). That’s ~67M people eating
        some pizza; many eat 2 slices, kids 1—blended average 2 slices → ~130M slices.

        Sanity: US has huge pizza market; if too high, cut participation to 12% → ~80M slices. Range ~70M–150M slices for that
        window.
    follow_ups:
      - How would including school cafeterias change the estimate?
      - What’s the most sensitive input?

  - id: EA-016
    difficulty: medium
    prompt: Estimate the number of gas stations in California.
    what_good_looks_like:
      - Picks a structure (stations per capita, per vehicle, or per road mile).
      - Uses California population/vehicle stock explicitly.
      - Cross-checks two methods if possible.
    answer:
      structure:
        - CA population and vehicles.
        - Stations per vehicle or per capita from a national anchor.
        - Range and reasonableness vs urban/rural CA.
      sample: >
        California population ~39M; registered vehicles very high, say ~35M light-duty vehicles (round).

        Method 1—vehicles per station: US total gas stations often cited ~100k–150k for the country. CA is ~12% of US
        population but car-dependent; assume CA has ~15% of stations → 15k–22k stations.

        Method 2—per capita: if US ~330M people and 120k stations → ~1 station per 2,750 people. CA 39M / 2,750 ≈ 14k. CA
        urban density might improve throughput so fewer stations per capita in cities but more in exurbs; blend ~10k–18k.

        I’ll estimate ~12k–18k gas stations in California.
    follow_ups:
      - How do EVs change the long-run station count?
      - Where would you pull a ground-truth list to validate?

  - id: EA-017
    difficulty: medium
    prompt: Estimate global smartphone unit sales per year.
    what_good_looks_like:
      - Separates new sales vs refurbished if relevant.
      - Anchors to population, replacement cycle, or market share logic.
      - Produces a defensible order-of-magnitude with range.
    answer:
      structure:
        - World population with phone access.
        - Replacement cycle and market growth/replacement mix.
        - Optional cross-check via installed base turnover.
      sample: >
        Global population ~8B; smartphone users maybe ~6–7B (many people share or use feature phones—use 6.5B smartphone
        users). Average replacement cycle ~3–4 years for those who upgrade → annual replacements ≈ 6.5B / 3.5 ≈ 1.85B
        phones/year.

        Add net new users (first-time buyers) maybe +100–200M/year in emerging markets. Total new unit sales ballpark
        ~1.2B–1.4B/year is a common industry order-of-magnitude; my quick math overshoots slightly—tune cycle to 4 years:
        6.5B/4 ≈ 1.6B plus first-time buyers → still high. Interview OK to widen range: ~1.0B–1.5B new smartphones sold/year
        globally, noting inventory and longer cycles pull it down.
    follow_ups:
      - How would you split premium vs budget phones?
      - What metric would you track for “saturation”?

  - id: EA-018
    difficulty: easy
    prompt: Estimate how many new email accounts are created on Gmail worldwide per day.
    what_good_looks_like:
      - Clarifies new accounts vs aliases; states scope.
      - Uses internet users, signup friction, and competition.
      - Compares to order-of-magnitude you already reasoned for “all providers” if needed.
    answer:
      structure:
        - Define “new Gmail account”.
        - Estimate signups across providers; apply Gmail share.
        - Or estimate Google Workspace + consumer together.
      sample: >
        Scope: new @gmail.com (and maybe googlemail) consumer accounts plus consumer-driven signups; ignore Workspace unless
        included—I'll say consumer Gmail.

        Global daily new email addresses across all providers might be ~2–5M/day (from a prior Fermi). Gmail has large share
        in many markets but not everywhere; assume 35–45% of new consumer mailboxes are Gmail → ~1M–2M/day.

        Cross-check: if 1.5M/day × 365 ≈ 550M/year new Gmail accounts—high but not absurd given population and churn; many
        are spam/abandoned. Range ~0.8M–2.5M/day.
    follow_ups:
      - How would bot signups bias public stats?
      - What assumption would you validate with a single Google internal query?

  - id: EA-019
    difficulty: medium
    prompt: Estimate the number of hotel rooms in Las Vegas.
    what_good_looks_like:
      - Uses visitor volume, occupancy, or inventory-based counting.
      - Handles casino-resort scale (large properties).
      - Gives a range and sanity-check vs tourism stats.
    answer:
      structure:
        - Annual visitors and average stay.
        - Rooms needed = visitors × nights / occupancy / rooms per property—or inventory build-up.
        - Alternative: major strip properties × average room count.
      sample: >
        Las Vegas metro gets order-of-magnitude 40M+ visitors/year. Average stay ~3 nights → ~120M room-nights demanded
        (rough). If annual occupancy averages ~85% for available room-nights, room-nights supplied ≈ demand / 0.85 ≈ 140M.

        Room-nights / 365 ≈ 385k room-nights/night average occupied → rooms ≈ 385k / 0.85 ≈ 450k rooms inventory (if
        occupancy 85%). That might be high; simpler inventory approach: ~150k–200k hotel rooms is a commonly cited
        ballpark—strip mega-resorts with 3k–5k rooms each; ~30–50 major hotels plus many mid/smaller.

        I’ll land ~130k–180k hotel rooms in Las Vegas proper (wider 100k–200k), noting definitions (metro vs strip) swing
        results.
    follow_ups:
      - How would convention season change occupancy vs room count?
      - Strip vs downtown—how would you segment?

  - id: EA-020
    difficulty: easy
    prompt: Estimate how many toothbrushes are sold in the United States per year.
    what_good_looks_like:
      - Separates manual vs electric replacement if needed.
      - Uses population × replacement cadence.
      - Notes multipacks and bulk purchasing implicitly.
    answer:
      structure:
        - US population.
        - Brushes per person per year (manual vs electric heads).
        - Multiply; range.
      sample: >
        US population ~335M. Assume each person uses ~3–4 manual toothbrushes/year (dentists recommend replace ~3 months).
        Some use electric brush heads—smaller units but similar replacement cadence; keep one “brush equivalents” per person
        ~4/year.

        Sales ≈ 335M × 4 ≈ 1.34B brush units/year. Multipacks mean “items sold” vs “brushes” differs slightly. Range ~1.0B–1.6B
        per year.
    follow_ups:
      - How would subscription toothbrush services change annual sales counting?
      - What about hotels giving disposable brushes?

  - id: EA-021
    difficulty: medium
    prompt: Estimate total annual movie theater admissions (tickets sold) in the United States.
    what_good_looks_like:
      - Clarifies domestic box office vs admissions if needed.
      - Uses per-capita visits or box office / average ticket price.
      - Acknowledges streaming substitution and post-pandemic shifts.
    answer:
      structure:
        - US population and annual visits per capita.
        - Or box office revenue / ATP.
        - Range and reasonableness.
      sample: >
        US population ~335M. Pre-streaming era might have been ~4–5 theater visits per person per year; now lower—assume
        ~1.5–2.5 visits/year post-pandemic recovery. Midpoint 2 → 335M × 2 ≈ 670M admissions/year.

        Cross-check with revenue: domestic box office often cited ballpark single-digit billions/year; average ticket price
        ~$10–12 → admissions ≈ $9B / $11 ≈ 800M. Close enough.

        I’ll estimate ~550M–900M admissions/year in the US.
    follow_ups:
      - How would you estimate opening weekend only?
      - Drive-ins vs multiplex—does segmentation matter?

  - id: EA-022
    difficulty: easy
    prompt: Estimate how many tennis balls are used in the United States in one year (including new cans purchased for play).
    what_good_looks_like:
      - Defines “used” (opened for play vs manufacturing output).
      - Segments casual vs club players or schools.
      - Uses balls per player per year or cans per court hour.
    answer:
      structure:
        - Number of regular tennis players.
        - Balls lost/worn per playing hour or per month.
        - Add coaches, clubs, ball machines.
      sample: >
        US people who play tennis at least monthly—guess ~12–18M. If they open 1 new can (3 balls) every 6 weeks on average,
        that’s ~8–9 cans/year → ~24–27 balls/year each. 15M × 25 ≈ 375M balls/year.

        Add high school/college teams, clubs, teaching pros with baskets—maybe +20–30% → ~450M–500M balls/year. Wide range
        300M–700M given participation uncertainty.
    follow_ups:
      - How would pickleball growth affect tennis ball demand?
      - What’s a quick retail shelf survey you’d run?

  - id: EA-023
    difficulty: medium
    prompt: Estimate how many hours of video are uploaded to YouTube every minute.
    what_good_looks_like:
      - Clarifies uploads vs processing; uses creators, upload frequency, or watch-time proxy carefully.
      - Distinguishes average video length.
