      - Would you integrate with wearables?
  - id: PD-023
    difficulty: hard
    prompt: Design a feature to help teenagers learn financial literacy in a banking app.
    what_good_looks_like:
      - Identifies stakeholder constraints (parents, regulators, safety).
      - Proposes engaging learning tied to real actions (saving, budgeting).
      - Avoids manipulation and respects privacy.
      - Defines learning + business metrics.
    answer:
      structure:
        - Clarify age range and parental controls.
        - Choose learning objectives.
        - Tie lessons to product moments.
        - Metrics and safeguards.
      sample: >
        I’d target 13–17 with parental oversight. Learning goals: budgeting basics, saving, and
        responsible spending. MVP: “Money Missions” that unlock when they take real actions: set a
        saving goal, track spending categories, or wait 24 hours before a discretionary purchase.
        Keep lessons short (1–2 minutes) and reward with non-monetary badges.

        Safeguards: parental visibility controls, no targeted ads, and clear privacy boundaries.
        Metrics: mission completion, savings rate, and retention; guardrails: overspending incidents
        and parental complaints.
    follow_ups:
      - How do you keep it engaging without gambling-like rewards?
      - What would you do differently for 18–22?
  - id: PD-024
    difficulty: medium
    prompt: Design a feature that helps users discover relevant podcasts.
    what_good_looks_like:
      - Uses personalization signals and explains recommendations.
      - Balances exploration vs exploitation.
      - Considers creator ecosystem and fairness.
      - Defines metrics.
    answer:
      structure:
        - Clarify discovery problem and user segments.
        - Propose recommendation surfaces.
        - Metrics and guardrails.
      sample: >
        For discovery, users want “something I’ll like” with low risk. MVP: a weekly “podcast
        sampler” playlist of 10 short clips from episodes, personalized by topics and listening
        history. Let users quickly like/skip to train preferences. Explain: “Because you follow X
        and listened to Y”.

        Metrics: starts, completions, follows, and 4-week retention; guardrails: diversity and
        creator concentration.
    follow_ups:
      - How do you avoid echo chambers?
      - How do you help brand-new users?
  - id: PD-025
    difficulty: medium
    prompt: Design an in-app reporting flow for harmful content that users trust.
    what_good_looks_like:
      - Minimizes user burden while collecting enough info.
      - Sets clear expectations (SLAs, what happens next).
      - Handles abuse and false reports.
      - Defines metrics for safety and user trust.
    answer:
      structure:
        - Clarify content types and policies.
        - Design reporting steps and confirmation.
        - Triage and communication.
        - Metrics and guardrails.
      sample: >
        Reporting should be fast and transparent. MVP: a 2-step flow: pick category (harassment,
        spam, self-harm, etc.) then confirm, with an optional text box. Immediately acknowledge
        receipt and show what to expect (e.g., “we’ll review within 24 hours”). For high-severity
        categories, offer additional actions like blocking or crisis resources.

        Back-end triage routes reports by severity and reporter trust signals; rate-limit abusive
        reporters. Metrics: report completion rate, time-to-action for high severity,
        false-positive/false-negative audits, and reporter satisfaction.
    follow_ups:
      - How do you prevent brigading/false reporting?
      - Should you inform the reported user?
  - id: PD-026
    difficulty: medium
    prompt: How would you improve Google Maps?
    what_good_looks_like:
      - Clear understanding of the product and its users.
      - Asks clarifying questions to define scope and objectives.
      - >-
        Presents a structured approach to problem-solving (personas, pain points, solutions,
        prioritization).
      - Identifies diverse user personas and selects one for deep dive.
      - Articulates specific pain points for the chosen persona.
      - Generates multiple, relevant feature ideas to address pain points.
    answer:
      structure:
        - >-
          **1. Understand the Product:** Briefly describe the product's current functionality and
          value.
        - >-
          **2. Clarify Scope & Objectives:** Ask targeted questions about the goal (e.g., overall
          improvement vs. specific feature, metric focus, platform).
        - >-
          **3. Outline Approach:** State the structured methodology to be followed (e.g., users,
          pain points, solutions, prioritization).
        - >-
          **4. Identify Users & Pain Points:** Segment users, choose a specific persona, and detail
          their current challenges or unmet needs.
        - >-
          **5. Brainstorm Solutions:** Propose multiple features or improvements directly addressing
          the identified pain points.
        - >-
          **6. Prioritize & Justify:** Evaluate solutions based on a framework (e.g., impact vs.
          effort/cost) and justify choices.
        - >-
          **7. Summarize & Recommend:** Conclude with the recommended feature(s) and a rationale for
          their selection.
      sample: >-
        Describe Google Maps - Google Maps allows user to go from Point A to Point B efficiently and
        provides several commute options such as driving, walking, public transport, and even like
        to ride sharing apps such as Uber and Lyft. User also uses Google Maps to search nearby
        places such as restaurants, gas stations, events, and things to do. 


        Ask Clarifying Questions from the Interviewer - 

        - Is the goal to improve the entire platform or a specific feature?

        - Is the improvement channel specific - Web or Mobile?

        - What's the objective of improvement? - engagement, increase in revenue, acquisition. etc.


        Once interviewer provides clarification to above question, I would start by first laying out
        the approach I am going to take to 

        (a) start by understanding who are users (personas) of Google Maps are, 

        (b) Pick one persona and what their goals or motivations are when using Google Maps

        (c) Then I will identify pain points (user needs) and suggest new features/ solutions to
        increase customer satisfaction leading to better customer engagement 

        (d) next, I will prioritize new features based on cost vs benefit, (e) Lastly I will
        summarize the overall analysis


        Users of Google Maps

        - Private vehicle owners

        - Bikers

        - Commuters using public transport

        - Walkers

        - Tourists

        - People using ride sharing app like Uber, Lyft etc.


        I am going to pick commuters using public transport such as train, bus, subways to go from
        point A to point B. Commuters hate when there is interruption is services that could be
        because of trains running late, major breakdown, change in train timing and route. People
        don't like waiting even if the train or bus is late by couple of minutes. Also not all train
        and bus stations are same when it comes to amenities such as access to elevators, public
        bathrooms, and information booth. Commuters such as old age people, family traveling with
        infants, and physically challenged people need these information in advance to plan their
        trip efficiently.


        Considering the above pain points that I just mentioned, here are few feature/ use cases
        that Google Maps can offer to delight the commuters

        - Personalized real-time notification to commuter when there is interruption in the service
        (this is especially useful to people commuting daily say from home to office and back).
        Google knows some very vital information about the commuter like at what time they start
        from home, from which station they take train, what time they head back home. These
        information can be used to send real-time train/bus service alert to commuter, so that they
        can prepare in advance, say may look for alternate route of mode of transportation. 

        - Book uber/ lyft for commuter, to the nearest alternate train/bus station, so that they can
        reach their destination on-time.

        - Train/ bus station information catalog showing all amenities and contact information. The
        catalog should get updated on regular interval,. So that commuter is aware of the change say
        elevator at station X is going through periodic maintenance

        - Collaboration platform that will categorize station based on people input on incidents
        such as number of theft, people fallen on track, people got stuck in between train and
        platform, or even broken machine. This will make people self-aware and will tell them to
        ride safe.        


        Now, I will prioritize the solutions across the user goal and complexity of development. The
        user's goals is to reach from point A to point B efficiently with most up to date
        information. 


        Solution


        Impact to User Goal


        Complexity


        1. Personalized real-time notification


        High: prompt and timely notification about delay or change in service will allow commuter to
        look for backup plan. They may opt to work remotely on that day. Also providing targeted
        notification is more valuable to user


        Medium: Google maps already capture information like train running late, where the
        congestion is.


        2. Book Lyft/Uber for commuter


        Low: not all commuter have same affordability level, they may find Lyft/Uber expensive
        option.  Also not everyone has Uber/ Lyft account.  This may serve just a subset of overall
        commuter population


        Low: Google Maps already shows ride sharing option to user when they search for route.


        3. Information catalog


        High: having up to date information about the station will help commuter plan their trip


        Medium: easy to develop initially but require ongoing maintenance to make sure that
        information is up to date and accurate.


        4. Train/Bus station rating


        High: getting review from other commuter increases trust.


        High: will require developing collaborate feature in Google Maps that will allow other
        commuters to update and provide information such as how many ticket vending machine are
        working, which machine is not accepting cash, etc.


        From the table, the two features that provide the highest impact for the lowest effort are
        (a) personalized real-time notification and (b) Information catalog. My recommendation would
        to start with these two solutions while also start brainstorming on building collaborative
        feature with in Google Maps as this will definitely change the way people see and use Google
        Maps today.
    follow_ups:
      - How would you measure the success of your recommended features?
      - What are the potential risks or negative side effects of implementing these changes?
      - >-
        How would these improvements align with Google's broader business strategy or monetization
        goals?
      - >-
        You rated 'Book Uber/Lyft' as low impact. Can you elaborate on why you think it wouldn't be
        valuable to a larger user segment?
      - >-
        What would be your Minimum Viable Product (MVP) for the 'Personalized real-time
        notification' feature?
      - >-
        How would you address the ongoing maintenance challenge for the 'Information catalog'
        feature?
